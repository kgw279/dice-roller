<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Dice Roller</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 400px; /* Keeps it small on big monitors */
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { text-align: center; font-size: 1.5rem; margin-top: 0; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; color: #64748b; }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.98); }

        .result-area {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px solid #f1f5f9;
            text-align: center;
        }

        .total-label { font-size: 1rem; color: #64748b; }
        .total-value { font-size: 4rem; font-weight: 800; color: var(--primary); margin: 5px 0; }
        
        .breakdown {
            font-size: 0.9rem;
            color: #94a3b8;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .history-btn {
            background: none;
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 20px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Dice Roller</h1>
    
    <div class="controls">
        <div>
            <label>DICE TYPE</label>
            <select id="diceType">
                <option value="2">1d2</option>
                <option value="3">1d3</option>
                <option value="4">1d4</option>
                <option value="6" selected>1d6</option>
                <option value="8">1d8</option>
                <option value="10">1d10</option>
                <option value="12">1d12</option>
                <option value="20">1d20</option>
                <option value="100">1d100</option>
            </select>
        </div>
        <div>
            <label>AMOUNT</label>
            <input type="number" id="diceCount" value="1" min="1" max="99">
        </div>
    </div>

    <button onclick="rollDice()">ROLL</button>

    <div class="result-area">
        <div class="total-label">Total Sum</div>
        <div id="totalDisplay" class="total-value">0</div>
        <div id="breakdownDisplay" class="breakdown">Roll results will appear here</div>
    </div>
</div>

<script>
    function rollDice() {
        const type = parseInt(document.getElementById('diceType').value);
        const count = parseInt(document.getElementById('diceCount').value);
        const totalDisplay = document.getElementById('totalDisplay');
        const breakdownDisplay = document.getElementById('breakdownDisplay');

        let rolls = [];
        let sum = 0;

        for (let i = 0; i < count; i++) {
            let roll = Math.floor(Math.random() * type) + 1;
            rolls.push(roll);
            sum += roll;
        }

        // Update UI
        totalDisplay.innerText = sum;
        breakdownDisplay.innerText = `Individual: ${rolls.join(', ')}`;
        
        // Simple animation effect
        totalDisplay.style.transform = "scale(1.1)";
        setTimeout(() => totalDisplay.style.transform = "scale(1)", 100);
    }
</script>

</body>
</html>

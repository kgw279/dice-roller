<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Dice Roller</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f1f5f9;
            --die-bg: #ffffff;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 280px; /* Condensed width */
            background: white;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .control-group { flex: 1; text-align: left; }
        
        label { font-size: 10px; font-weight: 800; color: #94a3b8; letter-spacing: 0.5px; }

        select, input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px; /* Prevents iOS zoom-in on focus */
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .dice-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            min-height: 60px;
        }

        /* The Visual Dice Styles */
        .die {
            width: 60px;
            height: 60px;
            background: var(--die-bg);
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .total-section {
            border-top: 1px solid #f1f5f9;
            padding-top: 10px;
        }

        .total-value {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <div class="control-group">
            <label>TYPE</label>
            <select id="diceType">
                <option value="2">d2</option>
                <option value="3">d3</option>
                <option value="4">d4</option>
                <option value="6" selected>d6</option>
                <option value="8">d8</option>
                <option value="10">d10</option>
                <option value="12">d12</option>
                <option value="20">d20</option>
                <option value="100">d100</option>
            </select>
        </div>
        <div class="control-group">
            <label>QTY</label>
            <input type="number" id="diceCount" value="2" inputmode="numeric" pattern="[0-9]*">
        </div>
    </div>

    <button onclick="rollDice()">ROLL DICE</button>

    <div class="dice-display" id="diceContainer">
        <div class="die">?</div>
        <div class="die">?</div>
    </div>

    <div class="total-section">
        <div style="font-size: 12px; color: #64748b;">TOTAL</div>
        <div id="totalDisplay" class="total-value">0</div>
    </div>
</div>

<script>
    function rollDice() {
        const type = parseInt(document.getElementById('diceType').value);
        const count = parseInt(document.getElementById('diceCount').value);
        const container = document.getElementById('diceContainer');
        const totalDisplay = document.getElementById('totalDisplay');

        container.innerHTML = '';
        let sum = 0;

        // Limiting visual dice to 10 so it doesn't break the layout
        const visualLimit = Math.min(count, 10);

        for (let i = 0; i < count; i++) {
            let roll = Math.floor(Math.random() * type) + 1;
            sum += roll;

            if (i < visualLimit) {
                const dieDiv = document.createElement('div');
                dieDiv.className = 'die';
                dieDiv.innerText = roll;
                container.appendChild(dieDiv);
            }
        }

        if (count > visualLimit) {
            const extra = document.createElement('div');
            extra.style.alignSelf = 'center';
            extra.innerText = `+${count - visualLimit} more`;
            container.appendChild(extra);
        }

        totalDisplay.innerText = sum;
    }
</script>

</body>
</html>
